<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RODEX | لوحة الإدارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-4xl mx-auto">
        <header class="bg-blue-900 text-white p-6 rounded-2xl shadow-xl mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">لوحة إدارة RODEX</h1>
                <p class="text-sm opacity-80 font-bold">إدارة شحنات السودان 🇸🇩</p>
            </div>
            <div id="countBox" class="bg-orange-500 px-4 py-2 rounded-lg font-bold text-white shadow-md">الطلبات: 0</div>
        </header>

        <div id="ordersContainer" class="space-y-4">
            <div class="text-center p-10 text-gray-500 bg-white rounded-xl shadow-inner">جاري جلب الطلبات من السحابة...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANjbdx0YO9j3BoZyzw6ualxO3H6jKbFkk",
            authDomain: "rodexsystem-1d447.firebaseapp.com",
            projectId: "rodexsystem-1d447",
            databaseURL: "https://rodexsystem-1d447-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const ordersRef = ref(db, 'orders');

        onValue(ordersRef, (snapshot) => {
            const container = document.getElementById('ordersContainer');
            const countBox = document.getElementById('countBox');
            container.innerHTML = "";
            let count = 0;

            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const order = childSnapshot.val();
                    const key = childSnapshot.key;
                    count++;
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-xl shadow-sm border-r-8 border-blue-600 flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-lg text-blue-900">${order.customer}</h3>
                                <p class="text-sm text-gray-700">📍 ${order.address}</p>
                                <p class="text-sm font-bold text-green-600 italic">📞 ${order.phone}</p>
                            </div>
                            <div class="text-left border-r pr-4">
                                <div class="text-xl font-bold text-orange-600 mb-2">${order.amount} ج.س</div>
                                <button onclick="deleteOrder('${key}')" class="bg-red-50 text-red-600 px-4 py-1 rounded-full text-xs font-bold border border-red-200 hover:bg-red-600 hover:text-white transition-all">تم التوصيل / حذف</button>
                            </div>
                        </div>
                    `;
                });
                countBox.innerText = "الطلبات: " + count;
            } else {
                container.innerHTML = '<div class="text-center p-10 text-gray-400 bg-white rounded-xl shadow-inner">لا توجد طلبات جديدة حالياً</div>';
                countBox.innerText = "الطلبات: 0";
            }
        });

        window.deleteOrder = (id) => {
            if(confirm("هل تم تسليم الطلب وتريد حذفه نهائياً؟")) {
                remove(ref(db, 'orders/' + id));
            }
        };
    </script>
</body>
</html>
