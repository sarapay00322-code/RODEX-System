<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RODEX | بوابة التاجر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f4f8; }
        .bg-rodex-blue { background-color: #1e3a8a; } 
        .bg-rodex-orange { background-color: #f97316; }
        .btn-hover:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10 bg-white p-6 rounded-2xl shadow-sm border-r-8 border-rodex-orange">
            <div>
                <h1 class="text-3xl font-bold text-rodex-blue">RODEX</h1>
                <p class="text-gray-500 text-sm">نظام إدارة شحنات رودكس - السودان</p>
            </div>
            <div class="text-left">
                <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">متصل بالسحابة ✅</span>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
            <div class="bg-rodex-blue p-6 text-white text-center">
                <h2 class="text-xl font-bold">إنشاء طلب شحن جديد</h2>
            </div>
            
            <form id="orderForm" class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">اسم المستلم (الزبون)</label>
                        <input type="text" id="custName" required class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-rodex-orange" placeholder="مثال: أحمد علي">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">رقم الهاتف (واتساب)</label>
                        <input type="tel" id="custPhone" required class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-rodex-orange" placeholder="09xxxxxxx">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">عنوان التوصيل بالتفصيل</label>
                    <input type="text" id="custAddress" required class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-rodex-orange" placeholder="المدينة - الحي - رقم المنزل">
                </div>

                <div class="bg-orange-50 p-6 rounded-2xl border-2 border-orange-100 text-center">
                    <label class="block text-lg font-bold text-rodex-blue mb-2">المبلغ المطلوب تحصيله (ج.س)</label>
                    <input type="number" id="orderPrice" required class="w-full max-w-xs mx-auto block border-b-4 border-rodex-orange bg-transparent text-3xl font-bold text-center outline-none" placeholder="0.00">
                </div>

                <button type="button" onclick="saveOrderToFirebase()" class="w-full bg-rodex-orange text-white py-5 rounded-2xl font-bold text-xl shadow-lg btn-hover">
                    تأكيد وإرسال لشركة رودكس 🚀
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // بيانات مشروعك (rodexsystem-1d447)
        const firebaseConfig = {
            apiKey: "AIzaSyANjbdx0YO9j3BoZyzw6ualxO3H6jKbFkk",
            authDomain: "rodexsystem-1d447.firebaseapp.com",
            projectId: "rodexsystem-1d447",
            storageBucket: "rodexsystem-1d447.firebasestorage.app",
            messagingSenderId: "386309492929",
            appId: "1:386309492929:web:919d4287f8a797091c0440",
            databaseURL: "https://rodexsystem-1d447-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveOrderToFirebase = function() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;
            const price = document.getElementById('orderPrice').value;

            if(!name || !phone || !price) {
                alert("يرجى ملء كافة الخانات!");
                return;
            }

            const orderID = "RDX-" + Math.floor(Math.random() * 10000);
            const ordersRef = ref(db, 'orders');
            const newOrderRef = push(ordersRef);

            set(newOrderRef, {
                orderID: orderID,
                customer: name,
                phone: phone,
                address: address,
                amount: price,
                status: "بانتظار الاستلام",
                timestamp: new Date().toISOString()
            }).then(() => {
                alert("تم إرسال الطلب بنجاح! رقم تتبعك هو: " + orderID);
                
                // فتح واتساب لإرسال الإشعار تلقائياً للعميل
                const msg = `مرحباً ${name}، تم تسجيل طلبك في شركة رودكس (RODEX) بنجاح. رقم الطلب: ${orderID}.`;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
                
                document.getElementById('orderForm').reset();
            }).catch((error) => {
                alert("فشل الإرسال: " + error.message);
            });
        }
    </script>
</body>
</html>
